        \             <jats:abstract xmlns:jats=\"http://www.ncbi.nlm.nih.gov/JATS1\">\r\n
        \               <jats:title>Abstract</jats:title>\r\n                <jats:p>\r\n
        \                 This article presents a practical roadmap for scholarly
        data repositories to implement data citation in accordance with the Joint
        Declaration of Data Citation Principles, a synopsis and harmonization of the
        recommendations of major science policy bodies. The roadmap was developed
        by the Repositories Expert Group, as part of the Data Citation Implementation
        Pilot (DCIP) project, an initiative of FORCE11.org and the NIH BioCADDIE (\r\n
        \                 <jats:ext-link xmlns:xlink=\"http://www.w3.org/1999/xlink\"
        ext-link-type=\"uri\" xlink:href=\"https://biocaddie.org\">https://biocaddie.org</jats:ext-link>\r\n
        \                 ) program. The roadmap makes 11 specific recommendations,
        grouped into three phases of implementation: a) required steps needed to support
        the Joint Declaration of Data Citation Principles, b) recommended steps that
        facilitate article/data publication workflows, and c) optional steps that
        further improve data citation support provided by data repositories.\r\n                </jats:p>\r\n
